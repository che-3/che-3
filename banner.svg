<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="460" viewBox="0 0 900 460" role="img" aria-label="Hi, I'm Matt - AI and Hardware Product Manager">
  <style>
    .name { font: 800 62px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#111111 }
    .role { font: 600 27px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#1a1a1a }
    .tag  { font: 600 17px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#3a3a3a }
  </style>
  <rect width="900" height="460" fill="#FFD43B"/>
  <g transform="translate(0,-320)">
    <text x="450" y="195" text-anchor="middle" class="name">Hi, I'm Matt!</text>
    <animateTransform attributeName="transform" type="translate" values="0 -320; 0 0; 7 0; -7 0; 3 0; 0 0" keyTimes="0;0.55;0.7;0.82;0.92;1" calcMode="spline" keySplines="0.12 0.8 0.25 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" dur="1.5s" fill="freeze"/>
  </g>
  <g transform="translate(0,300)">
    <text x="430" y="290" text-anchor="middle" class="role">AI &amp; Hardware Product Manager</text>
    <image x="636" y="267" width="34" height="34" xlink:href="data:image/png;base64,"/>
    <text x="450" y="350" text-anchor="middle" class="tag">Ships production AI agents &#183; 0-to-1 builder &#183; MCP &#183; multi-agent systems</text>
    <animateTransform attributeName="transform" type="translate" values="0 300; 0 0; -7 0; 7 0; -3 0; 0 0" keyTimes="0;0.55;0.7;0.82;0.92;1" calcMode="spline" keySplines="0.12 0.8 0.25 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" dur="1.5s" fill="freeze"/>
  </g>
</svg>
