<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="460" viewBox="0 0 900 460" role="img" aria-label="Hi, I'm Matt - AI and Hardware Product Manager">
  <style>
    .name { font: 800 58px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#111111 }
    .role { font: 600 24px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#1a1a1a }
    .tag  { font: 600 16px 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; fill:#3a3a3a }
  </style>
  <rect width="900" height="460" fill="#FFD43B"/>
  <g transform="translate(0,-260)">
    <text x="450" y="208" text-anchor="middle" class="name">Hi, I'm Matt!</text>
    <animateTransform attributeName="transform" type="translate" values="0 -260; 0 0" dur="0.85s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1" fill="freeze"/>
  </g>
  <g transform="translate(0,220)">
    <text x="431" y="266" text-anchor="middle" class="role">AI &amp; Hardware Product Manager</text>
    <image x="622" y="244" width="30" height="30" xlink:href="data:image/png;base64,"/>
    <text x="450" y="308" text-anchor="middle" class="tag">Ships production AI agents &#183; 0-to-1 builder &#183; MCP &#183; multi-agent systems</text>
    <animateTransform attributeName="transform" type="translate" values="0 220; 0 0" dur="0.85s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1" fill="freeze"/>
  </g>
</svg>
